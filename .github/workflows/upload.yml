name: Upload from Link

on:
  workflow_dispatch:    # اجرای دستی از طریق دکمه

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Download file from URL
        run: curl -L -o myfile.zip "https://filesto.firezone.space/download/gAAAAABp-EV-oul2ohT01fnRCHTcT_FHEyPJCe-B2cDum6OsbCWOpgaiJoNBOO7GTsZYrgB1abDU5boggvMiFJGbLD7WIclPigsgNmCtMzMPlIwzr8-Cv0vHGmpQ7KB9zH7nHCbk0hQwBGCCZCOclfpY1A4QK--kNU718YZrKlBdaIeULAamsVvsX-V1oRQWa5cnwsGFcNvq"
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: myfile.zip
          tag_name: v1.0.0   # نام تگ Release
          token: ${{ secrets.GITHUB_TOKEN }}
